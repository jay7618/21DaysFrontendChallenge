<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NebulaStore | Modern Product Filter UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./style.css">

</head>
<body>
<div class="app-container">
    <div class="brand-header">
        <h1>
            <i class="fas fa-microchip"></i> 
            Nebula<span style="color:#3b82f6;">Store</span>
        </h1>
        <p class="sub"><i class="fas fa-sliders-h"></i> discover · filter · elevate your tech gear</p>
    </div>

    <!-- filter section -->
    <div class="filter-bar">
        <div class="search-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" class="search-input" placeholder="Search products... (e.g., 4K, wireless, RGB)">
        </div>
        <div class="categories-container" id="categoryChipsContainer">
        </div>
        <button class="reset-btn" id="resetFilterBtn"><i class="fas fa-undo-alt"></i> Reset</button>
    </div>

    <div id="productsGrid" class="products-grid">
    </div>
</div>

    <script src="./script.js"></script>
</body>
</html>
