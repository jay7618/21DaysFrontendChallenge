<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="./style.css">
</head>

<body class="vh-100 d-flex justify-content-center align-items-center bg-dark">
        <section>
        <div class="container">
            <div class="clock-ui text-center">
                <h1 class="title">Digital Clock</h1>
                
                <!-- Time -->
                <div class="time-text">
                    <span id="hours">HH</span><span class="colon">:</span>
                    <span id="minutes">MM</span><span class="colon">:</span>
                    <span id="seconds">SS</span>
                </div>

                <div class="date-text"><span id="dayName"></span>, <span id="date"></span> <span id="month"></span> <span id="year"></span></div>

            </div>
        </div>
    </section>
    <script src="./script.js"></script>
</body>

</html>
