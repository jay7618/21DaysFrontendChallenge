<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> To-Do App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loadingScreen">
        <div class="loader-container">
            <div class="loader"></div>
            <p>Loading...</p>
        </div>
    </div>

    <div class="container d-flex justify-content-center align-items-center min-vh-100" id="appContainer" style="display: none;">
        <div class="todo-app p-4 rounded shadow-sm">
            <h2 class="text-center mb-4">My To-Do List</h2>
            <div class="input-group mb-3">
                <input type="text" id="taskInput" class="form-control" placeholder="Add a new task...">
                <button class="btn btn-success" id="addTaskBtn">
                    <i class="ri-add-line"></i>
                </button>
            </div>
            <ul id="taskList" class="list-group">
            </ul>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
