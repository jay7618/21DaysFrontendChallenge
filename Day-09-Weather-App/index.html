<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Nimbus — Modern Weather Experience</title>
    <!-- Google Fonts + Bootstrap Icons + Font Awesome 6 + Remix -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="container py-4 py-md-5">
    <div class="row justify-content-center">
        <div class="col-lg-7 col-md-9 col-12">
            <div class="glass-master p-4 p-md-5">
                <div class="text-center mb-4">
                    <div class="d-flex align-items-center justify-content-center gap-3 mb-2">
                        <i class="ri-cloudy-fill" style="font-size: 2.5rem; color: #ffe5b4; filter: drop-shadow(0 4px 6px #00000030);"></i>
                        <h1 class="display-6 fw-semibold" style="background: linear-gradient(130deg, #F9F6EE, #D9E2F5); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: -0.5px;">Nimbus</h1>
                        <i class="ri-sun-foggy-line" style="font-size: 2.2rem; color: #FFD966;"></i>
                    </div>
                    <p class="text-white-50" style="font-size: 0.9rem;">Real‑time elegance · Global weather insight</p>
                </div>

                <div class="input-group-custom d-flex align-items-center p-1 w-100">
                    <input type="text" id="cityInput" class="form-control city-input-modern" placeholder="e.g., London, Tokyo, New Delhi" value="Tokyo">
                    <button id="getWeatherBtn" class="search-btn-modern btn">
                        <i class="ri-search-line me-1"></i>
                    </button>
                </div>

                <div id="weatherInfoContainer" class="mt-4">
                    <div class="text-center text-white-50 py-4 px-2" id="emptyState">
                        <i class="ri-map-pin-line" style="font-size: 3rem; opacity: 0.5;"></i>
                        <p class="mt-2 mb-0">search any city to reveal atmospheric magic ✨</p>
                    </div>
                </div>
            </div>
            <!-- <div class="text-center text-white-50 mt-3 small">
                <i class="ri-dashboard-line"></i> Live data · Powered by OpenWeather
            </div> -->
        </div>
    </div>
</div>

    <script src="./script.js"></script>
</body>
</html>
